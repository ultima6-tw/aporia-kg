# Knowledge Freshness Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Each topic defines:
#   detect_keywords : words matched against the user's goal to identify topic
#                     (matched case-insensitively; first match wins)
#   ttl             : time-to-live in days per content category before re-crawl
#       event       : time-bound activities (festivals, workshops, launches)
#       pricing     : costs, fees, ticket prices, subscriptions
#       schedule    : timetables, opening hours, departure times
#       how_to      : guides, tutorials, step-by-step instructions
#       news        : recent developments, announcements
#       concept     : stable knowledge, theory, history, culture
#   realtime_triggers : keywords in the user message that bypass TTL and force
#                       a live search regardless of cached content age
#
# The "default" topic is used when no other topic matches.
# TTL = 0 means always re-crawl (effectively real-time).
# ─────────────────────────────────────────────────────────────────────────────

topics:

  # ── 1. Travel ──────────────────────────────────────────────────────────────
  travel:
    name: Travel
    detect_keywords:
      # Chinese
      - 旅遊, 旅行, 出遊, 自助旅行, 背包客, 觀光, 行程規劃, 景點, 出國, 機票, 簽證
      # English
      - travel, trip, vacation, itinerary, backpacking, sightseeing, tourism, flight, visa
      # Japanese
      - 旅行, 観光, 旅, バックパッカー, 海外旅行
    ttl:
      event:    3      # Festivals and seasonal activities change frequently
      pricing:  7      # Airfare and hotel rates shift week to week
      schedule: 14     # Transport timetables, ferry / bus schedules
      how_to:   60     # Travel guides and tips are fairly stable
      news:     3      # Travel advisories, entry requirements
      concept:  365    # Culture, history, geography — rarely changes
    realtime_triggers:
      - 今天, 今年, 現在, 最新, 最近, 這週, 這個月
      - today, current, now, latest, this week, this month, 2025, 2026

